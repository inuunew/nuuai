<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Top Up Game</title>

<script src="database.js"></script>

<style>

body{
font-family:Arial;
background:#e9eef3;
margin:0;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:16px;
font-size:20px;
display:flex;
align-items:center;
gap:10px;
}

/* CONTAINER */

.container{
padding:15px;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

/* INFO BOX */

.info{
background:white;
padding:12px;
border-radius:10px;
margin-top:10px;
}

/* PRODUCT */

.product{
background:white;
margin-top:10px;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product.active{
border:2px solid #ff6a00;
}

.price{
color:#ff6a00;
font-weight:bold;
}

/* BUTTON */

button{
width:100%;
margin-top:20px;
padding:14px;
background:#ff6a00;
border:none;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
← <span id="title">Game</span>
</div>

<div class="container">

<div id="formArea"></div>

<div id="productList"></div>

<button onclick="checkout()">Beli Sekarang</button>

</div>

<script>

/* AMBIL GAME DARI URL */

const params = new URLSearchParams(window.location.search)

const game = params.get("game")

const data = database[game]

if(!data){
alert("Game tidak ditemukan")
}

/* SET JUDUL */

document.getElementById("title").innerText = data.name


/* FORM INPUT */

const formArea = document.getElementById("formArea")

if(data.type==="id"){

formArea.innerHTML=`

<div class="info">

<h3>Masukkan ID Player</h3>

<input id="playerId" placeholder="Masukkan ID Player">

</div>

`

}


if(data.type==="voucher"){

formArea.innerHTML=`

<div class="info">

Produk ini berupa voucher.<br>
Tidak perlu memasukkan ID Player.

</div>

`

}


if(data.type==="uid"){

formArea.innerHTML=`

<div class="info">

<h3>Masukkan UID</h3>

<input id="uid" placeholder="Masukkan UID">

<h3>Pilih Server</h3>

<select id="server">

<option>America</option>
<option>Asia</option>
<option>Europe</option>
<option>TW, HK, MO</option>

</select>

</div>

`

}


/* LIST PRODUK */

const productList = document.getElementById("productList")

let selected=""

data.items.forEach(item=>{

let div=document.createElement("div")

div.className="product"

div.innerHTML=`

<div>${item.name}</div>

<div class="price">${item.price}</div>

`

div.onclick=()=>{

document.querySelectorAll(".product").forEach(p=>p.classList.remove("active"))

div.classList.add("active")

selected=item.name+" "+item.price

}

productList.appendChild(div)

})


/* CHECKOUT */

function checkout(){

let phone="6281234567890"

let message="Top Up Game\n\n"

message+=`Game : ${data.name}\n`

if(data.type==="id"){

let id=document.getElementById("playerId").value

if(id==""){
alert("Masukkan ID Player")
return
}

message+=`ID : ${id}\n`

}


if(data.type==="uid"){

let uid=document.getElementById("uid").value
let server=document.getElementById("server").value

if(uid==""){
alert("Masukkan UID")
return
}

message+=`UID : ${uid}\n`
message+=`Server : ${server}\n`

}

if(selected==""){
alert("Pilih produk")
return
}

message+=`Produk : ${selected}`

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url)

}

</script>

</body>
</html>
