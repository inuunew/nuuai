<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRIS Pembayaran</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f5f6fa;
margin:0;
}

.header{
background:#5b7cff;
color:white;
padding:15px;
font-size:18px;
text-align:center;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.timer{
color:red;
font-weight:bold;
text-align:center;
margin:10px 0;
}

.qr{
text-align:center;
margin:15px 0;
}

.qr img{
width:180px;
border-radius:12px;
}

.btn{
display:block;
width:100%;
padding:12px;
background:#5b7cff;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.warning{
background:#f5f6fa;
padding:10px;
border-radius:10px;
font-size:13px;
margin-top:10px;
text-align:center;
}

.total{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-top:15px;
}

.detail{
margin-top:10px;
background:#f9f9f9;
padding:10px;
border-radius:10px;
font-size:14px;
}

.detail div{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.cancel{
margin-top:15px;
background:#ff4d4d;
color:white;
border:none;
width:100%;
padding:12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.input, .upload{
margin-top:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}
/*qris*/
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup img{
width:90%;
max-width:400px;
border-radius:15px;
}

.popup.active{
display:flex;
}
.close{
position:absolute;
top:20px;
right:25px;
font-size:30px;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">INUU MARKET</div>

<div class="container">

<div class="card">

<div class="timer" id="timer">Batas Waktu: 30:00</div>

<div class="qr">
<img src="qris.jpg">
</div>
<div id="popupQR" class="popup">
  <span class="close" onclick="tutupQR()">×</span>
  <img src="qris.jpg">
</div>

<button class="btn" onclick="bukaQR()">Lihat / Perbesar QRIS</button>

<div class="warning">
QRIS hanya berlaku 1x. Jangan transfer ulang ke QRIS yang sama.
</div>

<div class="total">
<span>Total Bayar</span>
<span id="total">Rp 0</span>
</div>

<div class="detail">
<div><span>Jumlah</span><span id="jumlah">Rp 0</span></div>
<div><span>Kode Unik</span><span id="kode">-</span></div>
<div><span>Biaya Admin</span><span>Rp 0</span></div>
</div>

<div class="input">
<input type="number" id="nominal" placeholder="Masukkan Nominal">
</div>

<div class="upload">
<input type="file" id="bukti">
</div>

<button class="btn" onclick="kirim()">Konfirmasi Pembayaran</button>

<button class="cancel">Batalkan</button>

</div>

</div>

<script>
function bukaQR(){
document.getElementById("popupQR").classList.add("active")
}

function tutupQR(){
document.getElementById("popupQR").classList.remove("active")
}
</script>
<script>
const params = new URLSearchParams(location.search)

const data = {
price: parseInt(params.get("price")) || 1000
}

// generate kode unik
const kodeUnik = Math.floor(Math.random()*900)+100

const total = data.price + kodeUnik

document.getElementById("jumlah").innerText = "Rp " + data.price.toLocaleString()
document.getElementById("kode").innerText = kodeUnik
document.getElementById("total").innerText = "Rp " + total.toLocaleString()

// TIMER
let time = 1800
const timerEl = document.getElementById("timer")

setInterval(()=>{
let m = Math.floor(time/60)
let s = time%60

timerEl.innerText = `Batas Waktu: ${m}:${s<10?"0":""}${s}`
time--

if(time <= 0){
timerEl.innerText = "QRIS EXPIRED"
}
},1000)

// KIRIM TELEGRAM
async function kirim(){
const nominal = document.getElementById("nominal").value
const file = document.getElementById("bukti").files[0]

if(!nominal || !file){
alert("Lengkapi data!")
return
}

const BOT_TOKEN = "8416791607:AAG6qRAnaGP-bYJUyOFTlCd_XAeEgFi9v1w"
const CHAT_ID = "7314158034"

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id: CHAT_ID,
text: `Pembayaran Masuk\nNominal: Rp ${nominal}`
})
})

let form = new FormData()
form.append("chat_id", CHAT_ID)
form.append("photo", file)

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
method: "POST",
body: form
})

alert("Berhasil dikirim!")
}
</script>

</body>
</html>
