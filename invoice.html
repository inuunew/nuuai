<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRIS Pembayaran</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f5f6fa;
margin:0;
-webkit-tap-highlight-color: transparent;
}

.header{
background:#5b7cff;
color:white;
padding:15px;
font-size:18px;
text-align:center;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.timer{
color:red;
font-weight:bold;
text-align:center;
margin:10px 0;
}

.qr{
text-align:center;
margin:15px 0;
}

.qr img{
width:180px;
border-radius:12px;
}

.btn{
display:block;
width:100%;
padding:12px;
background:#5b7cff;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.warning{
background:#f5f6fa;
padding:10px;
border-radius:10px;
font-size:13px;
margin-top:10px;
text-align:center;
}

.total{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-top:15px;
}

.detail{
margin-top:10px;
background:#f9f9f9;
padding:10px;
border-radius:10px;
font-size:14px;
}

.detail div{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.cancel{
margin-top:15px;
background:#ff4d4d;
color:white;
border:none;
width:100%;
padding:12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.input, .upload{
margin-top:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}
/*qris*/
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup img{
width:90%;
max-width:400px;
border-radius:15px;
}

.popup.active{
display:flex;
}
.close{
position:absolute;
top:20px;
right:25px;
font-size:30px;
color:white;
font-weight:bold;
cursor:pointer;
}
/*box*/
.field{
margin-top:15px;
}

.field label{
font-size:13px;
font-weight:bold;
color:#555;
display:block;
margin-bottom:5px;
}

/* INPUT NOMINAL */
.input-box{
display:flex;
align-items:center;
background:#f1f3f6;
border-radius:10px;
padding:10px;
border:2px solid transparent;
transition:0.2s;
}

.input-box span{
margin-right:5px;
color:#888;
}

.input-box input{
border:none;
background:none;
outline:none;
width:100%;
font-size:16px;
}

/* efek saat klik */
.input-box:focus-within{
border-color:#5b7cff;
background:#fff;
}

/* UPLOAD */
.upload-box{
display:block;
background:#f1f3f6;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
border:2px dashed #ccc;
transition:0.2s;
}

.upload-box:hover{
border-color:#5b7cff;
background:#eef1ff;
}
/*produk*/
.product{
margin-top:15px;
background:#eef1ff;
padding:12px;
border-radius:10px;
font-size:14px;
}

.product b{
display:block;
margin-bottom:5px;
color:#333;
}
</style>

</head>

<body>

<div class="header">INUU MARKET</div>

<div class="container">

<div class="card">

<div class="timer" id="timer">Batas Waktu: 15:00</div>

<div class="field" id="paymentInfo" style="display:none;">
  <label>Nomor Pembayaran</label>
  <div id="paymentNumber" style="padding:10px;background:#eef1ff;border-radius:8px;font-weight:bold;"></div>
</div>

<div class="qr">
<img src="qris.jpg">
</div>
<div id="popupQR" class="popup" onclick="tutupQR()">
  <span class="close" onclick="tutupQR()">×</span>
  <img src="qris.jpg" onclick="event.stopPropagation()">
</div>

<button class="btn" onclick="bukaQR()">Lihat / Perbesar QRIS</button>

<div class="warning">
PASTIKAN DATA DIISI DENGAN BENAR, KARNA JIKA SALAH ITU BUKAN TANGGUNG KAMI! 
</div>



<div class="product">
  <div><b>Produk</b></div>
  <div id="produk">-</div>
</div>

<div class="total">
<span>Total Bayar</span>
<span id="total">Rp 0</span>
</div>

<div class="detail">
<div><span>Jumlah</span><span id="jumlah">Rp 0</span></div>
<div><span>Biaya Admin</span><span id="kode"></span></div>
</div>



<div class="upload-box" onclick="document.getElementById('bukti').click()">
  <input type="file" id="bukti" accept="image/*" style="display:none;">
  <span id="uploadText">Klik untuk upload gambar</span>
</div>

<button class="btn" id="confirmBtn">Konfirmasi</button>

<div id="loading" style="display:none; text-align:center; margin-top:15px;">
  <div style="font-weight:bold; color:#5b7cff;">⏳ Memproses pembayaran...</div>
</div>



<button class="cancel" onclick="window.history.back()">Batalkan</button>

</div>

</div>

<script>
// =========================
// AMBIL PARAMETER
// =========================
const params = new URLSearchParams(window.location.search);

const data = {
  game: params.get("game") || "-",
  item: params.get("item") || "-",
  price: parseInt(params.get("price")) || 0,
  type: params.get("type") || "-",
  userId: params.get("userId") || "",
  username: params.get("username") || "",
  phone: params.get("phone") || "",
  server: params.get("server") || "",
  payment: params.get("payment") || ""
};

const payMethod = (data.payment || "").toUpperCase();

// =========================
// HITUNG TOTAL
// =========================
const admin = 300;
const total = data.price + admin;

// =========================
// DOM
// =========================
const produkEl = document.getElementById("produk");
const jumlahEl = document.getElementById("jumlah");
const kodeEl = document.getElementById("kode");
const totalEl = document.getElementById("total");
const paymentInfoDiv = document.getElementById("paymentInfo");
const paymentNumberEl = document.getElementById("paymentNumber");
const qrDiv = document.querySelector(".qr");
const popupQR = document.getElementById("popupQR");
const confirmBtn = document.getElementById("confirmBtn");
const loading = document.getElementById("loading");
const inputFile = document.getElementById("bukti");

// =========================
// TAMPILKAN PRODUK
// =========================
produkEl.innerHTML = `
  <b>Layanan : ${data.game}</b><br>
  Item : ${data.item}<br>
  <span style="color:#666;">
    ${data.userId ? `ID: ${data.userId}<br>` : ""}
    ${data.username ? `Username: ${data.username}<br>` : ""}
    ${data.phone ? `HP: ${data.phone}<br>` : ""}
    ${data.server ? `Server: ${data.server}<br>` : ""}
  </span>
`;

jumlahEl.innerText = "Rp " + data.price.toLocaleString("id-ID");
kodeEl.innerText = "Rp " + admin.toLocaleString("id-ID");
totalEl.innerText = "Rp " + total.toLocaleString("id-ID");

// =========================
// DATA PEMBAYARAN
// =========================
const paymentData = {
  "DANA": "083160556330",
  "OVO": "081234567890",
  "GOPAY": "081298765432",
  "SHOPEEPAY": "085701234567",
  "TRANSFER BANK": "BCA 123-456-7890"
};

// =========================
// HANDLE PEMBAYARAN
// =========================
if(payMethod.includes("QRIS")){
  qrDiv.style.display = "block";
  paymentInfoDiv.style.display = "none";
} else if(payMethod && paymentData[payMethod]){
  qrDiv.style.display = "none";
  paymentInfoDiv.style.display = "block";
  paymentNumberEl.innerText = paymentData[payMethod];
} else {
  qrDiv.style.display = "none";
  paymentInfoDiv.style.display = "none";
}

// =========================
// QR POPUP
// =========================
function bukaQR(){
  popupQR.classList.add("active");
}

function tutupQR(){
  popupQR.classList.remove("active");
}

// =========================
// TIMER
// =========================
let time = 1800;
const timerEl = document.getElementById("timer");

setInterval(() => {
  if (time <= 0) {
    timerEl.innerText = "QRIS EXPIRED";
    return;
  }

  let m = Math.floor(time / 60);
  let s = time % 60;

  timerEl.innerText = `Batas Waktu: ${m}:${s < 10 ? "0" : ""}${s}`;
  time--;
}, 1000);

// =========================
// UPLOAD FILE (FIX)
// =========================
inputFile.addEventListener("change", function(){
  console.log("FILE:", this.files);

  const fileName = this.files[0]?.name || "Klik untuk upload gambar";
  document.getElementById("uploadText").innerText = fileName;
});

// =========================
// KONFIRMASI
// =========================
confirmBtn.onclick = async () => {
  const file = inputFile.files[0];

  console.log("FILE SAAT CONFIRM:", file);

  if (!file){
    alert("Upload bukti transfer dulu!");
    return;
  }

  confirmBtn.style.display = "none";
  loading.style.display = "block";

  try {
    await kirimTelegram(file);
    alert("Berhasil dikirim ke admin!");
    window.location.href = "final.html?" + params.toString();
  } catch(e){
    console.error(e);
    alert("Gagal kirim ke admin!");
    confirmBtn.style.display = "block";
    loading.style.display = "none";
  }
};

// =========================
// KIRIM TELEGRAM
// =========================
async function kirimTelegram(file){

  const BOT_TOKEN = "8416791607:AAG6qRAnaGP-bYJUyOFTlCd_XAeEgFi9v1w";
  const CHAT_ID = "7314158034";

  const pesan = `
📌 PEMBAYARAN MASUK

Game: ${data.game}
Item: ${data.item}
Total: Rp ${total.toLocaleString("id-ID")}
User ID: ${data.userId}
Username: ${data.username}
HP: ${data.phone}
Server: ${data.server}
Metode: ${data.payment}
`;

  // kirim teks
  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: pesan
    })
  });

  // kirim foto
  let form = new FormData();
  form.append("chat_id", CHAT_ID);
  form.append("photo", file);

  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
    method:"POST",
    body: form
  });
}
</script>
</body>
</html>
