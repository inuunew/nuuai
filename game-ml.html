<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Mobile Legends</title>
<style>
body{font-family:Arial;background:#2b003d;color:white;margin:0;}
.game-header{display:flex;align-items:center;padding:20px;gap:15px;}
.game-header img{width:70px;border-radius:12px;}
.game-header h2{margin:0;}
.step-box{background:white;color:black;margin:15px;padding:20px;border-radius:15px;}
.step-box h3{margin-top:0;}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;margin-top:8px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:10px;}
.card{background:#f4f4f4;border-radius:15px;padding:15px;text-align:center;cursor:pointer;border:3px solid transparent;transition:0.2s;}
.card:hover{transform:scale(1.05);}
.card img{width:40px;}
.card.active{border:3px solid #6b3df4;}
.price{color:#e91e63;font-weight:bold;margin-top:5px;}
button{width:100%;padding:15px;margin-top:20px;background:#6b3df4;color:white;border:none;border-radius:30px;font-size:16px;cursor:pointer;}
</style>
</head>
<body>

<div class="game-header">
<img src="assets/ml.png" alt="Mobile Legends">
<h2>Mobile Legends Top-Up</h2>
</div>

<div class="step-box">
<h3>1. Masukkan Player ID</h3>
<input type="text" id="userId" placeholder="Masukkan Player ID">
</div>

<div class="step-box">
<h3>2. Pilih Nominal Diamond</h3>
<div class="grid" id="packageGrid"></div>
</div>

<div class="step-box">
<h3>3. Pilih Paket Lain / Membership</h3>
<div class="grid" id="otherPackageGrid"></div>
</div>

<div class="step-box">
<button onclick="checkout()">Lanjutkan ke WhatsApp</button>
</div>

<script>
// Diamond
const diamondPackages = [
{name:"86 Diamonds",price:"Rp 20.000"},
{name:"172 Diamonds",price:"Rp 39.000"},
{name:"257 Diamonds",price:"Rp 58.000"},
{name:"344 Diamonds",price:"Rp 77.000"}
];
// Paket lain
const otherPackages = [
{name:"Membership Level Up Pass",price:"Rp 15.000"},
{name:"Membership Mingguan 50dm",price:"Rp 30.000"},
{name:"BP",price:"Rp 44.000"},
{name:"Membership Bulanan 50dm",price:"Rp 84.000"}
];

let selectedPackage = null;

// Render Diamond
const diamondGrid = document.getElementById("packageGrid");
diamondPackages.forEach(p=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<h3>${p.name}</h3><img src="assets/diamond.png"><p class="price">${p.price}</p>`;
  div.onclick=()=>{
    document.querySelectorAll("#packageGrid .card,#otherPackageGrid .card").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    selectedPackage=p.name+" - "+p.price;
  };
  diamondGrid.appendChild(div);
});

// Render Paket Lain
const otherGrid=document.getElementById("otherPackageGrid");
otherPackages.forEach(p=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<h3>${p.name}</h3><p class="price">${p.price}</p>`;
  div.onclick=()=>{
    document.querySelectorAll("#packageGrid .card,#otherPackageGrid .card").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    selectedPackage=p.name+" - "+p.price;
  };
  otherGrid.appendChild(div);
});

// Checkout
function checkout(){
  const userId=document.getElementById("userId").value;
  if(userId===""){alert("Masukkan Player ID");return;}
  if(!selectedPackage){alert("Pilih paket dulu");return;}
  const message=`Halo Admin saya ingin top up\n\nGame: Mobile Legends\nUser ID: ${userId}\nPaket: ${selectedPackage}\n\nMohon diproses`;
  const phone="6283160556330"; // ganti nomor admin WA
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
