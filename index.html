<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Top Up Store</title>
<style>
body{
  font-family: Arial;
  background: #1b0b2e;
  color:white;
  margin:0;
}
header{
  background:#2c1246;
  padding:20px;
  text-align:center;
}
.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:#2d1448;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition: transform 0.2s;
}
.card:hover{
  transform: scale(1.05);
}
.card img{
  width:80px;
  margin-bottom:10px;
}
.card a{
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  background:#7c3aed;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>
<body>

<header>
<h1>Game Top Up Store</h1>
<p>Pilih game yang ingin di top up</p>
</header>

<div class="games">

<div class="card">
<img src="assets/ff.png" alt="Free Fire">
<h3>Free Fire</h3>
<a href="game.html?game=Free%20Fire">Top Up</a>
</div>

<div class="card">
<img src="assets/ml.png" alt="Mobile Legends">
<h3>Mobile Legends</h3>
<a href="game.html?game=Mobile%20Legends">Top Up</a>
</div>

<div class="card">
<img src="assets/pubg.png" alt="PUBG Mobile">
<h3>PUBG Mobile</h3>
<a href="game.html?game=PUBG%20Mobile">Top Up</a>
</div>

<div class="card">
<img src="assets/genshin.png" alt="Genshin Impact">
<h3>Genshin Impact</h3>
<a href="game.html?game=Genshin%20Impact">Top Up</a>
</div>

</div>

</body>
</html>
