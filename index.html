<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Top Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#f3f3f3;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:16px;
display:flex;
align-items:center;
gap:10px;
font-size:18px;
font-weight:500;
}

.back{
font-size:22px;
cursor:pointer;
}

/* BANNER */

.banner-container{
padding:15px;
}

.slider{
position:relative;
overflow:hidden;
border-radius:14px;
}

.slide{
display:none;
}

.slide img{
width:100%;
border-radius:14px;
}

.active{
display:block;
}

/* DOT */

.dots{
text-align:center;
margin-top:8px;
}

.dot{
height:6px;
width:18px;
margin:4px;
background:#ccc;
display:inline-block;
border-radius:10px;
}

.dot.active{
background:#ff6a00;
}

/* SEARCH */

.search-area{
display:flex;
gap:10px;
padding:15px;
align-items:center;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#eaeaea;
font-size:14px;
}

/* ICON BUTTON */

.view-btn{
display:flex;
gap:10px;
font-size:22px;
color:#333;
}

/* TITLE */

.section-title{
padding:0 15px;
font-weight:600;
margin-bottom:10px;
}

/* GAME GRID */

.game-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:15px;
}

.game-card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.game-card:hover{
transform:scale(1.03);
}

.game-card img{
width:100%;
display:block;
}

/* FOOTER */

.footer{
text-align:center;
color:#666;
font-size:14px;
margin:30px 0;
}

.footer span{
color:#ff6a00;
font-weight:600;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
<div class="back">←</div>
<div>Game</div>
</div>

<!-- BANNER -->

<div class="banner-container">

<div class="slider">

<div class="slide active">
<img src="https://picsum.photos/800/300?1">
</div>

<div class="slide">
<img src="https://picsum.photos/800/300?2">
</div>

<div class="slide">
<img src="https://picsum.photos/800/300?3">
</div>

</div>

<div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</div>

<!-- SEARCH -->

<div class="search-area">

<div class="search-box">
<input type="text" id="searchGame" placeholder="Cari game...">
</div>

<div class="view-btn">
☰ ⬛
</div>

</div>

<!-- TITLE -->

<div class="section-title">
Game Terpopuler
</div>

<!-- GAME GRID -->

<div class="game-grid">

<div class="game-card">
<a href="game.html?game=ml">
<img src="assets/ml.png">
</a>
</div>

<div class="game-card">
<a href="game.html?game=ff">
<img src="assets/ff.png">
</a>
</div>

<div class="game-card">
<a href="game.html?game=pubg">
<img src="assets/pubg.png">
</a>
</div>

<div class="game-card">
<a href="game.html?game=genshin">
<img src="assets/genshin.png">
</a>
</div>

</div>

<!-- FOOTER -->

<div class="footer">
Powered by <span>InuuProject</span><br>
© 2026 All rights reserved
</div>

<script>

/* SLIDER */

let slides = document.querySelectorAll(".slide")
let dots = document.querySelectorAll(".dot")

let index = 0

function showSlide(){

slides.forEach(s => s.classList.remove("active"))
dots.forEach(d => d.classList.remove("active"))

index++

if(index > slides.length){
index = 1
}

slides[index-1].classList.add("active")
dots[index-1].classList.add("active")

}

setInterval(showSlide,4000)


/* SEARCH GAME */

let search = document.getElementById("searchGame")
let games = document.querySelectorAll(".game-card")

search.addEventListener("keyup",function(){

let keyword = search.value.toLowerCase()

games.forEach(game=>{

let name = game.innerText.toLowerCase()

if(name.includes(keyword)){
game.style.display="block"
}else{
game.style.display="none"
}

})

})

</script>

</body>
</html>
