<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@32,400,0,0" />
<style>
/* --- CSS sama seperti versi kamu sebelumnya --- */
@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap");
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}
:root{--text-color:#fff;--subheading-color:#ccc;--placeholder-color:#aaa;--primary-color:#0f0f23;--secondary-color:#1a1a2e;--secondary-hover-color:#252541;--scrollbar-color:#555;--accent-color:#8B5CF6;--accent-secondary:#EC4899}
body.light-theme{--text-color:#000;--subheading-color:#666;--placeholder-color:#888;--primary-color:#f8f8ff;--secondary-color:#f0f0f5;--secondary-hover-color:#e0e0eb;--scrollbar-color:#c0c0c0;--accent-color:#8B5CF6;--accent-secondary:#EC4899}
body{color:var(--text-color);background:var(--primary-color);transition:background .3s ease}
.container{overflow-y:auto;padding:32px 0 60px;height:calc(100vh - 127px);scrollbar-color:var(--scrollbar-color) transparent}
.container :where(.app-header,.suggestions,.message,.prompt-wrapper){position:relative;margin:0 auto;width:100%;padding:0 20px;max-width:990px}
.app-header{margin-top:3vh;text-align:center}
.app-header .heading{font-size:3rem;background:linear-gradient(to right,var(--accent-color),var(--accent-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.app-header .sub-heading{font-size:1.5rem;color:var(--subheading-color)}
.suggestions{width:100%;list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:9.5vh}
body.chats-active .container :where(.app-header,.suggestions){display:none}
.suggestions .suggestions-item{cursor:pointer;padding:18px;height:120px;display:flex;flex-direction:column;align-items:flex-start;border-radius:16px;justify-content:space-between;background:var(--secondary-color);transition:.3s ease;border:1px solid rgba(139,92,246,.2);box-shadow:0 4px 6px rgba(0,0,0,.1)}
.suggestions .suggestions-item:hover{background:var(--secondary-hover-color);transform:translateY(-5px);box-shadow:0 8px 15px rgba(139,92,246,.3)}
.suggestions .suggestions-item .text{font-size:1.1rem;font-weight:500}
.suggestions .suggestions-item .icon{width:45px;height:45px;display:flex;font-size:1.4rem;align-self:flex-end;align-items:center;border-radius:50%;justify-content:center;color:var(--accent-color);background:var(--primary-color)}
.suggestions .suggestions-item:nth-child(2) .icon{color:var(--accent-secondary)}
.suggestions .suggestions-item:nth-child(3) .icon{color:var(--accent-color)}
.suggestions .suggestions-item:nth-child(4) .icon{color:var(--accent-secondary)}
.chats-container{display:flex;gap:20px;flex-direction:column}
.message{display:flex;gap:11px;align-items:flex-start;animation:messageAppear .3s ease-out}
@keyframes messageAppear{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.user-message{flex-direction:column;align-items:flex-end}
.user-message .message-text{padding:12px 16px;max-width:85%;background:linear-gradient(135deg,var(--accent-color),var(--accent-secondary));border-radius:18px 18px 4px 18px;word-break:break-word;color:#fff;box-shadow:0 4px 6px rgba(139,92,246,.2)}
.message-content{line-height:1.6;font-size:14px;color:var(--text-color);text-align:left;padding:15px;background:var(--secondary-color);border-radius:18px;box-shadow:0 4px 6px rgba(0,0,0,.1);border:1px solid rgba(139,92,246,.1)}
.message-content h1,h2,h3,h4,h5,h6{margin:16px 0 10px 0;font-weight:600;line-height:1.3;color:inherit}
.message-content a{color:#BE60EE;text-decoration:none;border-bottom:1px solid #BE60EE}
.message-content a:hover{color:#9a4ed1;text-decoration:underline}
.prompt-container{position:fixed;width:100%;left:0;bottom:0;padding:16px 0;background:var(--primary-color);border-top:1px solid var(--secondary-color)}
.prompt-wrapper,.prompt-form,.prompt-actions{display:flex;gap:12px;height:56px;align-items:center}
.prompt-form{height:100%;width:100%;border-radius:28px;background:var(--secondary-color);border:1px solid rgba(139,92,246,.2);transition:all .3s ease}
.prompt-form:focus-within{box-shadow:0 0 0 2px rgba(139,92,246,.3)}
.prompt-input{width:100%;height:100%;background:none;outline:none;border:none;font-size:1rem;color:var(--text-color);padding-left:24px}
.prompt-input::placeholder{color:var(--placeholder-color)}
.prompt-actions{gap:5px;margin-right:7px}
#send-prompt-btn{color:#fff;display:none;background:linear-gradient(135deg,var(--accent-color),var(--accent-secondary))}
.prompt-input:valid~.prompt-actions #send-prompt-btn{display:flex}
#send-prompt-btn:hover{transform:scale(1.05)}
.home-btn{position:fixed;top:20px;left:20px;z-index:1000;width:50px;height:50px;border-radius:50%;background:var(--secondary-color);border:1px solid rgba(139,92,246,.2);color:var(--text-color);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s ease;text-decoration:none}
.home-btn:hover{background:var(--secondary-hover-color);transform:scale(1.1)}
.material-symbols-rounded{font-size:1.5rem}
</style>
</head>
<body>
<a id="home-btn" class="home-btn" href="/dashboard"><span class="material-symbols-rounded">home</span></a>

<div class="container">
<header class="app-header">
<h1 class="heading">Halo, selamat datang!</h1>
<h4 class="sub-heading">Ada yang bisa saya bantu?</h4>
</header>

<ul class="suggestions">
<li class="suggestions-item"><p class="text">Apa cuaca hari ini?</p><span class="icon material-symbols-rounded">cloud</span></li>
<li class="suggestions-item"><p class="text">Rekomendasi film terbaru</p><span class="icon material-symbols-rounded">movie</span></li>
<li class="suggestions-item"><p class="text">Cara membuat kue bolu</p><span class="icon material-symbols-rounded">cake</span></li>
<li class="suggestions-item"><p class="text">Tips belajar yang efektif</p><span class="icon material-symbols-rounded">school</span></li>
</ul>

<div class="chats-container"></div>

<div class="prompt-container">
<div class="prompt-wrapper">
<form action="#" class="prompt-form">
<input type="text" placeholder="Tanyakan sesuatu..." class="prompt-input" required />
<div class="prompt-actions">
<button id="send-prompt-btn" class="material-symbols-rounded">arrow_upward</button>
</div>
</form>
</div>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const chatContainer = document.querySelector(".chats-container");
    const promptInput = document.querySelector(".prompt-input");
    const sendButton = document.querySelector("#send-prompt-btn");
    const suggestions = document.querySelectorAll(".suggestions-item");

    let chatHistory = [];

    const scrollToBottom = () => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    };

    function formatAIResponse(text) {
        if (!text) return '';
        let formattedText = text;

        formattedText = formattedText.replace(/```(\w+)?\n([\s\S]*?)```/g, (m,l,c)=>`<pre><code>${c.trim()}</code></pre>`);
        formattedText = formattedText.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
        formattedText = formattedText.replace(/\*(.*?)\*/g,'<em>$1</em>');
        formattedText = formattedText.replace(/^### (.*$)/gim,'<h3>$1</h3>');
        formattedText = formattedText.replace(/^## (.*$)/gim,'<h2>$1</h2>');
        formattedText = formattedText.replace(/^# (.*$)/gim,'<h1>$1</h1>');
        formattedText = formattedText.replace(/^> (.*$)/gim,'<blockquote>$1</blockquote>');
        formattedText = formattedText.replace(/`([^`]+)`/g,'<code>$1</code>');
        formattedText = formattedText.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');

        return formattedText.split('\n').map(l=>l.trim()?`<p>${l}</p>`:'').join('');
    }

    function addMessage(text, isUser=false){
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${isUser ? 'user-message':'bot-message'}`;
        if(isUser){
            messageDiv.innerHTML = `<div class="message-text">${text}</div>`;
        } else {
            messageDiv.innerHTML = `<div class="message-content">${formatAIResponse(text)}</div>`;
        }
        chatContainer.appendChild(messageDiv);
        scrollToBottom();
    }

    async function sendMessage(){
        const message = promptInput.value.trim();
        if(!message) return;
        addMessage(message,true);
        promptInput.value='';

        const typingDiv = document.createElement("div");
        typingDiv.className = "message bot-message";
        typingDiv.innerHTML = '<div class="message-content">Mengetik...</div>';
        chatContainer.appendChild(typingDiv);
        scrollToBottom();

        try{
            chatHistory.push({role:"user",content:message});

            const res = await fetch("/api/chat",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({message,chatHistory})
            });

            const data = await res.json();
            chatContainer.removeChild(typingDiv);

            if(!res.ok) throw new Error(data.error||"API Error");

            const aiMessage = data.message;
            addMessage(aiMessage,false);
            chatHistory.push({role:"assistant",content:aiMessage});

        }catch(err){
            chatContainer.removeChild(typingDiv);
            addMessage(`Error: ${err.message}`,false);
        }
    }

    sendButton.addEventListener('click', sendMessage);
    promptInput.addEventListener('keypress', e=>{
        if(e.key==='Enter'&&!e.shiftKey){
            e.preventDefault();
            sendMessage();
        }
    });

    suggestions.forEach(item=>{
        item.addEventListener('click',function(){
            promptInput.value = this.querySelector('.text').textContent;
            sendMessage();
        });
    });

});
</script>
</body>
</html>
