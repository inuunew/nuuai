<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#070b1f;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

h1{
font-size:32px;
background:linear-gradient(90deg,#7b5cff,#ff4db8);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
color:#aaa;
margin-bottom:20px;
}

.card{
background:#0f1435;
padding:20px;
border-radius:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.card:hover{
background:#171c44;
}

.chat-box{
height:300px;
overflow:auto;
margin-bottom:20px;
}

.message{
margin:10px 0;
}

.user{
text-align:right;
color:#7b5cff;
}

.ai{
text-align:left;
color:#ffffff;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
border-radius:20px;
border:none;
background:#0f1435;
color:white;
}

button{
padding:15px;
border:none;
border-radius:20px;
background:#7b5cff;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Halo, selamat datang!</h1>
<div class="subtitle">Ada yang bisa saya bantu?</div>

<div class="card" onclick="quick('Apa cuaca hari ini?')">
Apa cuaca hari ini?
</div>

<div class="card" onclick="quick('Rekomendasi film terbaru')">
Rekomendasi film terbaru
</div>

<div class="card" onclick="quick('Cara membuat kue bolu')">
Cara membuat kue bolu
</div>

<div class="card" onclick="quick('Tips belajar yang efektif')">
Tips belajar yang efektif
</div>

<div class="chat-box" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Tanyakan sesuatu...">
<button onclick="send()">Kirim</button>
</div>

</div>

<script>

const API_URL="/api/chat"

let history=[]

function addMessage(text,cls){

const chat=document.getElementById("chat")

const div=document.createElement("div")

div.className="message "+cls

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function send(){

const input=document.getElementById("input")

const message=input.value

if(!message)return

addMessage(message,"user")

input.value=""

const response=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message,
history:history
})
})

const data=await response.json()

addMessage(data.reply,"ai")

history.push({role:"user",content:message})
history.push({role:"assistant",content:data.reply})

}

function quick(text){

document.getElementById("input").value=text

send()

}

</script>

</body>
</html>
