<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Free Fire</title>
<style>
body{
  font-family: Arial;
  background:#2b003d;
  color:white;
  margin:0;
}
/* HEADER GAME */
.game-header{
  display:flex;
  align-items:center;
  padding:20px;
  gap:15px;
}
.game-header img{
  width:70px;
  border-radius:12px;
}
.game-header h2{
  margin:0;
}
/* STEP BOX */
.step-box{
  background:white;
  color:black;
  margin:15px;
  padding:20px;
  border-radius:15px;
}
.step-box h3{
  margin-top:0;
}
input{
  width:90%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:8px;
}
/* GRID CARD */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  margin-top:10px;
}
.card{
  background:#f4f4f4;
  border-radius:15px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  border:3px solid transparent;
  transition:0.2s;
}
.card:hover{
  transform: scale(1.05);
}
.card img{
  width:40px;
}
.card.active{
  border:3px solid #6b3df4;
}
.price{
  color:#e91e63;
  font-weight:bold;
  margin-top:5px;
}
button{
  width:100%;
  padding:15px;
  margin-top:20px;
  background:#6b3df4;
  color:white;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="game-header">
<img src="assets/ff.png" alt="Free Fire">
<h2>Free Fire Top-Up</h2>
</div>

<!-- STEP 1 -->
<div class="step-box">
<h3>1. Masukkan Player ID</h3>
<input type="text" id="userId" placeholder="Masukkan Player ID">
</div>

<!-- STEP 2: Diamond -->
<div class="step-box">
<h3>2. Pilih Nominal Diamond</h3>
<div class="grid" id="packageGrid"></div>
</div>

<!-- STEP 3: Paket Lain / Membership -->
<div class="step-box">
<h3>3. Pilih Paket Lain / Membership</h3>
<div class="grid" id="otherPackageGrid"></div>
</div>

<!-- CHECKOUT -->
<div class="step-box">
<button onclick="checkout()">Lanjutkan ke WhatsApp</button>
</div>

<script>
// Paket Diamond
const diamondPackages = [
  {name:"12 Diamond",price:"Rp 2.500"},
  {name:"50 Diamond",price:"Rp 8.000"},
  {name:"70 Diamond",price:"Rp 10.000"},
  {name:"100 Diamond",price:"Rp 15.000"},
  {name:"140 Diamond",price:"Rp 18.000"},
  {name:"210 Diamond",price:"Rp 27.000"},
  {name:"355 Diamond",price:"Rp 44.000"},
  {name:"500 Diamond",price:"Rp 65.000"}
];

// Paket lain / membership
const otherPackages = [
  {name:"Membership Level Up Pass",price:"Rp 15.000"},
  {name:"Membership Mingguan 50dm",price:"Rp 30.000"},
  {name:"BP",price:"Rp 44.000"},
  {name:"Membership Bulanan 50dm",price:"Rp 84.000"}
];

let selectedPackage = null;

// Render Diamond
const diamondGrid = document.getElementById("packageGrid");
diamondPackages.forEach(p=>{
  let div = document.createElement("div");
  div.className="card";
  div.innerHTML = `<h3>${p.name}</h3><img src="assets/diamond.png"><p class="price">${p.price}</p>`;
  div.onclick = ()=>{
    document.querySelectorAll("#packageGrid .card, #otherPackageGrid .card").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    selectedPackage = p.name+" - "+p.price;
  };
  diamondGrid.appendChild(div);
});

// Render Membership / Paket Lain
const otherGrid = document.getElementById("otherPackageGrid");
otherPackages.forEach(p=>{
  let div = document.createElement("div");
  div.className="card";
  div.innerHTML = `<h3>${p.name}</h3><p class="price">${p.price}</p>`;
  div.onclick = ()=>{
    document.querySelectorAll("#packageGrid .card, #otherPackageGrid .card").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    selectedPackage = p.name+" - "+p.price;
  };
  otherGrid.appendChild(div);
});

// Checkout ke WhatsApp
function checkout(){
  const userId = document.getElementById("userId").value;
  if(userId===""){ alert("Masukkan Player ID"); return; }
  if(!selectedPackage){ alert("Pilih paket dulu"); return; }
  const message = `Halo Admin saya ingin top up\n\nGame: Free Fire\nUser ID: ${userId}\nPaket: ${selectedPackage}\n\nMohon diproses`;
  const phone="6283160556330"; // ganti sesuai WA admin
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
