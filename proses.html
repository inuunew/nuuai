<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Proses Pembayaran - Inuu Market</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 64px;
      margin-bottom: 16px;
      color: #16a34a;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #0f172a;
    }

    .status-text {
      background: #fef9c3;
      color: #854d0e;
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .status-text i {
      margin-right: 6px;
    }

    .message {
      color: #334155;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .order-detail {
      background: #f8fafc;
      padding: 16px;
      border-radius: 20px;
      margin: 15px 0;
      font-size: 14px;
      text-align: left;
      border: 1px solid #e2e8f0;
    }
    .order-detail div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .order-detail strong {
      color: #1e293b;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      transition: 0.2s;
      margin-top: 12px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
    }

    .btn-primary {
      background: #16a34a;
      color: white;
    }
    .btn-primary i {
      margin-right: 8px;
    }

    .btn-primary:active {
      background: #15803d;
      transform: scale(0.97);
    }

    .small-note {
      font-size: 12px;
      color: #64748b;
      margin-top: 20px;
    }
    .small-note a {
      color: #16a34a;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">
    <i class="fas fa-hourglass-half fa-spin" style="animation-duration: 3s;"></i>
  </div>
  <div class="status-text">
    <i class="fas fa-spinner fa-pulse"></i> PEMBAYARAN SEDANG DIPERIKSA
  </div>
  
  <h2>Terima kasih!</h2>
  
  <div class="message">
    <p>Bukti transfer Anda telah diterima untuk pesanan:</p>
    
    <div class="order-detail">
      <div><span>Invoice:</span> <strong id="displayInv">#000000</strong></div>
      <div><span>Produk:</span> <strong id="displayProd">-</strong></div>
      <div><span>Status:</span> <strong style="color: #f59e0b;">Dalam Antrean</strong></div>
    </div>

    <i class="fas fa-check-circle" style="color: #16a34a;"></i> Admin akan memverifikasi dalam waktu <strong>maksimal 15 menit</strong>.
  </div>

  <button class="btn btn-primary" id="homeBtn">
    <i class="fas fa-home"></i> Kembali ke Beranda
  </button>

  <div class="small-note">
    <i class="fas fa-info-circle"></i> Jika dalam 1 jam belum ada konfirmasi, silakan <a href="https://wa.me/628XXXXXXXXXX">Hubungi CS di WhatsApp</a>.
  </div>
</div>

<script>
  // Ambil data dari sessionStorage yang dikirim oleh invoice.html
  const stored = sessionStorage.getItem('invoiceData');
  
  if (stored) {
    const data = JSON.parse(stored);
    // Tampilkan data ke layar secara dinamis
    document.getElementById('displayInv').innerText = data.invoiceNumber;
    document.getElementById('displayProd').innerText = data.game + " - " + data.item;
  } else {
    // Jika user masuk ke halaman ini tanpa transaksi (iseng ketik URL)
    document.querySelector('.message').innerHTML = "Belum ada data transaksi terdeteksi.";
  }

  // Aksi tombol Home
  document.getElementById('homeBtn').addEventListener('click', () => {
    // Opsional: Hapus session setelah selesai agar bersih
    // sessionStorage.removeItem('invoiceData');
    window.location.href = 'index.html';
  });

  // Opsional: Redirect otomatis ke beranda setelah 30 detik
  /*
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 30000);
  */
</script>

</body>
</html>
