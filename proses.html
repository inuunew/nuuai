<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Proses Pembayaran - Inuu Market</title>
  
  <!-- Font Awesome 6 & Google Font Outfit -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 64px;
      margin-bottom: 16px;
      color: #16a34a;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #0f172a;
    }

    .status-text {
      background: #fef9c3;
      color: #854d0e;
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .status-text i {
      margin-right: 6px;
    }

    .message {
      color: #334155;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .message i {
      margin-right: 4px;
      color: #16a34a;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      transition: 0.2s;
      margin-top: 12px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
    }

    .btn-primary {
      background: #16a34a;
      color: white;
    }
    .btn-primary i {
      margin-right: 8px;
    }

    .btn-primary:active {
      background: #15803d;
      transform: scale(0.97);
    }

    .btn-outline {
      background: white;
      border: 1px solid #cbd5e1;
      color: #1e293b;
    }

    .small-note {
      font-size: 12px;
      color: #64748b;
      margin-top: 20px;
    }
    .small-note i {
      margin-right: 4px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <i class="fas fa-hourglass-half"></i>
  </div>
  <div class="status-text">
    <i class="fas fa-spinner fa-pulse"></i> PEMBAYARAN SEDANG DIPERIKSA
  </div>
  <h2><i class="fas fa-check-circle"></i> Terima kasih!</h2>
  <div class="message">
    <i class="fas fa-check"></i> Bukti transfer Anda telah diterima.<br>
    Admin akan memverifikasi dalam waktu <strong>maksimal 15 menit</strong>.<br>
    <i class="fab fa-whatsapp"></i> Silakan tunggu notifikasi via WhatsApp atau Email.
  </div>
  <button class="btn btn-primary" id="homeBtn">
    <i class="fas fa-home"></i> Kembali ke Beranda
  </button>
  <div class="small-note">
    <i class="fas fa-clock"></i> Jika dalam 1 jam belum ada konfirmasi, hubungi CS di WhatsApp.
  </div>
</div>

<script>
  document.getElementById('homeBtn').addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  // Opsional: tampilkan data invoice dari sessionStorage (hanya untuk debugging)
  const stored = sessionStorage.getItem('invoiceData');
  if (stored) {
    console.log('Invoice terkirim:', JSON.parse(stored));
  }
</script>
</body>
</html>
